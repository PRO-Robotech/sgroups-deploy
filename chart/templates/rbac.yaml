apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "sgroups.apiserverServiceAccountName" . }}
  namespace: {{ include "sgroups.namespace" . }}
  labels:
    {{- include "sgroups.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "sgroups.apiserverName" . }}
  labels:
    {{- include "sgroups.labels" . | nindent 4 }}
rules:
  - apiGroups: ["sgroups.io"]
    resources: ["tenants", "addressgroups"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["admissionregistration.k8s.io"]
    resources:
      - validatingwebhookconfigurations
      - mutatingwebhookconfigurations
      - validatingadmissionpolicies
      - validatingadmissionpolicybindings
      - mutatingadmissionpolicies
      - mutatingadmissionpolicybindings
    verbs: ["get", "list", "watch"]
  - apiGroups: ["flowcontrol.apiserver.k8s.io"]
    resources: ["flowschemas", "prioritylevelconfigurations"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "sgroups.apiserverName" . }}
  labels:
    {{- include "sgroups.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "sgroups.apiserverName" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "sgroups.apiserverServiceAccountName" . }}
    namespace: {{ include "sgroups.namespace" . }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "sgroups.apiserverName" . }}:system:auth-delegator
  labels:
    {{- include "sgroups.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:auth-delegator
subjects:
  - kind: ServiceAccount
    name: {{ include "sgroups.apiserverServiceAccountName" . }}
    namespace: {{ include "sgroups.namespace" . }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "sgroups.apiserverName" . }}:extension-apiserver-authentication-reader
  namespace: kube-system
  labels:
    {{- include "sgroups.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: extension-apiserver-authentication-reader
subjects:
  - kind: ServiceAccount
    name: {{ include "sgroups.apiserverServiceAccountName" . }}
    namespace: {{ include "sgroups.namespace" . }}
