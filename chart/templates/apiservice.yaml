apiVersion: apiregistration.k8s.io/v1
kind: APIService
metadata:
  name: {{ printf "%s.%s" .Values.apiService.version .Values.apiService.group }}
  labels:
    {{- include "sgroups.labels" . | nindent 4 }}
  annotations:
    cert-manager.io/inject-ca-from: {{ include "sgroups.namespace" . }}/{{ include "sgroups.apiserverCertName" . }}
spec:
  group: {{ .Values.apiService.group }}
  version: {{ .Values.apiService.version }}
  groupPriorityMinimum: {{ .Values.apiService.groupPriorityMinimum }}
  versionPriority: {{ .Values.apiService.versionPriority }}
  service:
    name: {{ include "sgroups.apiserverName" . }}
    namespace: {{ include "sgroups.namespace" . }}
  caBundle: ""
  insecureSkipTLSVerify: false
