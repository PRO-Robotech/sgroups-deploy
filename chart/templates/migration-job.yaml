{{- if .Values.postgres.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "sgroups.fullname" . }}-migration
  namespace: {{ include "sgroups.namespace" . }}
  labels:
    {{- include "sgroups.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "0"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: {{ .Values.migration.backoffLimit }}
  ttlSecondsAfterFinished: {{ .Values.migration.ttlSecondsAfterFinished }}
  template:
    metadata:
      labels:
        {{- include "sgroups.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migration
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-postgres
          image: {{ include "sgroups.migrationWaitImage" . }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          command:
            - sh
            - -c
            - |
              until pg_isready -h {{ include "sgroups.postgresHost" . }} -U {{ .Values.postgres.auth.username }} -d {{ .Values.postgres.auth.database }}; do
                echo "Waiting for PostgreSQL..."
                sleep 2
              done
      containers:
        - name: goose
          image: {{ include "sgroups.migrationImage" . }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          command:
            {{- toYaml .Values.migration.command | nindent 12 }}
          args:
            - -table=sg_db_ver
            - -dir
            - {{ .Values.migration.dir | quote }}
            - postgres
            - {{ include "sgroups.migrationPostgresUrl" . | quote }}
            - up
{{- end }}
