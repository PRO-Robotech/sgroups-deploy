{{- if .Values.postgres.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "sgroups.postgresSecretName" . }}
  namespace: {{ include "sgroups.namespace" . }}
  labels:
    {{- include "sgroups.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_USER: {{ .Values.postgres.auth.username | quote }}
  POSTGRES_PASSWORD: {{ .Values.postgres.auth.password | quote }}
  POSTGRES_DB: {{ .Values.postgres.auth.database | quote }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "sgroups.postgresName" . }}
  namespace: {{ include "sgroups.namespace" . }}
  labels:
    {{- include "sgroups.labels" . | nindent 4 }}
spec:
  clusterIP: None
  selector:
    app: {{ include "sgroups.postgresName" . }}
  ports:
    - name: postgres
      port: {{ .Values.postgres.service.port }}
      targetPort: {{ .Values.postgres.service.port }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "sgroups.postgresName" . }}
  namespace: {{ include "sgroups.namespace" . }}
  labels:
    {{- include "sgroups.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "sgroups.postgresName" . }}
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "sgroups.postgresName" . }}
  template:
    metadata:
      labels:
        app: {{ include "sgroups.postgresName" . }}
        {{- include "sgroups.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: postgres
          image: {{ include "sgroups.postgresImage" . }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          {{- with .Values.postgres.runtimeParameters }}
          args:
            {{- range $key, $value := . }}
            - -c
            - {{ printf "%s=%v" $key $value | quote }}
            {{- end }}
          {{- end }}
          ports:
            - name: postgres
              containerPort: {{ .Values.postgres.service.port }}
          envFrom:
            - secretRef:
                name: {{ include "sgroups.postgresSecretName" . }}
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - {{ .Values.postgres.auth.username }}
                - -d
                - {{ .Values.postgres.auth.database }}
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - {{ .Values.postgres.auth.username }}
                - -d
                - {{ .Values.postgres.auth.database }}
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            {{- toYaml .Values.postgres.resources | nindent 12 }}
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
        labels:
          {{- include "sgroups.labels" . | nindent 10 }}
      spec:
        accessModes:
          - ReadWriteOnce
        {{- if .Values.postgres.persistence.storageClass }}
        storageClassName: {{ .Values.postgres.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.postgres.persistence.size }}
{{- end }}
