{{- if and .Values.server.enabled (eq .Values.internalTLS.certSource "certmanager") }}

{{- $certmanager  := .Values.internalTLS.certmanager -}}
{{- $extIssuer    := $certmanager.existingIssuer -}}
{{- $issuerKind   := "Issuer" -}}
{{- $issuerName   := (include "sgroups-k8s-api.labels" .) -}}

{{- if and $extIssuer.kind $extIssuer.name }}
  {{- $issuerKind   = $extIssuer.kind -}}
  {{- $issuerName   = $extIssuer.name -}}
{{- end }}

---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "sgroups-k8s-api.labels" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "k8s-role-graph.labels" . | nindent 4 }}
spec:
  issuerRef:
    group: cert-manager.io
    kind: {{ $issuerKind }}
    name: {{ $issuerName }}
  dnsNames:
    - "{{ include "sgroups-k8s-api.labels" . }}"
    - "{{ include "sgroups-k8s-api.labels" . }}.{{ .Release.Namespace }}"
    - "{{ include "sgroups-k8s-api.labels" . }}.{{ .Release.Namespace }}.svc"
    {{ if $certmanager.extraDnsNames }}
    {{ range $certmanager.extraDnsNames }}
    - {{ . }}
    {{ end }}
    {{ end }}
  {{ with $certmanager.extraIPAddresses }}
  ipAddresses:
    {{ . | toYaml | nindent 4 }}
  {{ end }}
  commonName: "{{ .Release.Namespace }}"
  secretName: {{ include "sgroups-k8s-api.labels" . }}
{{- end }}
