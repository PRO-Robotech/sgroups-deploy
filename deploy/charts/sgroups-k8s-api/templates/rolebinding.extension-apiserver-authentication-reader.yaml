---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: "{{ include "sgroups-k8s-api.fullname" . }}:extension-apiserver-authentication-reader"
  namespace: kube-system
  labels:
    {{- include "sgroups-k8s-api.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: extension-apiserver-authentication-reader
subjects:
  - kind: ServiceAccount
    name: {{ include "sgroups-k8s-api.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
