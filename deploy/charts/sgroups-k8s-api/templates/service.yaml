apiVersion: v1
kind: Service
metadata:
  name: {{ include "sgroups-k8s-api.fullname" . }}
  labels:
    {{- include "sgroups-k8s-api.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.ports.apiserver }}
      targetPort: http
      protocol: TCP
      name: http
    - port: {{ .Values.service.ports.controller }}
      targetPort: controller
      protocol: TCP
      name: controller
  selector:
    {{- include "sgroups-k8s-api.selectorLabels" . | nindent 4 }}
