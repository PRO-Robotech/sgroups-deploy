{{- if .Values.hosthooks.enabled }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "sgroups-agent.fullname" . }}
  namespace: {{ $.Release.Namespace }}
rules:
  - apiGroups:
      - netguard.sgroups.io
    resources:
      - hosts
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
{{- end }}
