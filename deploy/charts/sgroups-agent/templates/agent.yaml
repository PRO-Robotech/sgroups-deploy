apiVersion: apps/v1
{{- if eq .Values.type "Deployment" }}
kind: Deployment
{{- else }}
kind: DaemonSet
{{- end }}
metadata:
  name: {{ include "sgroups-agent.fullname" . }}
  labels:
    {{- include "sgroups-agent.labels" . | nindent 4 }}
spec:
  {{- if and (not .Values.autoscaling.enabled) (eq .Values.type "Deployment") }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "sgroups-agent.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        # Monitor ConfigMap changes and restart pods when they change
        checksum/agent-config: {{ include (print $.Template.BasePath "/agent.configmap.yaml") . | sha256sum }}
        {{- if .Values.collector.enabled }}
        checksum/collector-config: {{ include (print $.Template.BasePath "/collector.configmap.yaml") . | sha256sum }}
        {{- end }}
      labels:
        {{- include "sgroups-agent.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "sgroups-agent.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds | default 30 }}
      containers:
        - name: agent
          {{- with .Values.agent.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.agent.image.repository }}:{{ .Values.agent.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.agent.image.pullPolicy }}
          command:
            - /app/bin/sg-agent
          args:
            - --config
            - /opt/h-bf/sgroups/client/config.yaml
          ports:
            - name: metrics
              containerPort: {{ .Values.service.agent.metrics }}
              protocol: TCP
          {{- with .Values.agent.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.agent.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.agent.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: agent-config
              mountPath: /opt/h-bf/sgroups/client/
              readOnly: true
          {{- with .Values.agent.volumeMounts }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- if .Values.hosthooks.enabled }}
        - name: hosthooks
          image: "{{ .Values.hosthooks.image.repository }}:{{ .Values.hosthooks.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.hosthooks.image.pullPolicy }}
          command:
            - "/bin/sh"
            - "-lc"
            - "echo ready; tail -f /dev/null"
          env:
            - name: NFT_HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NFT_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NFT_UID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.uid
            {{- range $k, $v := .Values.hosthooks.extraEnv }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          {{- with .Values.hosthooks.lifecycle }}
          lifecycle:
            {{- if .postStart }}
            postStart:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - {{ .postStart | quote }}
            {{- end }}
            {{- if .preStop }}
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - {{ .preStop | quote }}
            {{- end }}
          {{- end }}
          {{- with .Values.hosthooks.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- end }}
        {{- if .Values.collector.enabled }}
        - name: collector
          {{- with .Values.collector.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.collector.image.repository }}:{{ .Values.collector.image.tag }}"
          imagePullPolicy: {{ .Values.collector.image.pullPolicy }}
          command:
            - /app/bin/trace-collector
          args:
            - --config
            - /opt/h-bf/sgroups/collector/config.yaml
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: TC_APP_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.uid
            {{- range $k, $v := .Values.collector.extraEnv }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          ports:
            - name: collector
              containerPort: {{ .Values.service.collector.metrics | default 9680 }}
              protocol: TCP
          {{- with .Values.collector.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.collector.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.collector.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: collector-config
              mountPath: /opt/h-bf/sgroups/collector/
              readOnly: true
          {{- with .Values.collector.volumeMounts }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- end }}
        {{- if .Values.debug.enabled }}
        - name: debug
          {{- with .Values.debug.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.debug.image.repository }}:{{ .Values.debug.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.debug.image.pullPolicy }}
          command:
            - sleep
            - infinity
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NFT_HOSTINFO_UID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.uid
            - name: PRD_DEF_APP_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.uid
            {{- range $k, $v := .Values.debug.extraEnv }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          {{- with .Values.debug.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.debug.volumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- end }}
      volumes:
        - name: agent-config
          configMap:
            name: {{ include "sgroups-agent.fullname" . }}-agent-config
            defaultMode: 0644
        - name: collector-config
          configMap:
            name: {{ include "sgroups-agent.fullname" . }}-collector-config
            defaultMode: 0644
      {{- with .Values.volumes }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
