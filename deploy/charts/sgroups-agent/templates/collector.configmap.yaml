---
# Collector configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "sgroups-agent.fullname" . }}-collector-config
  labels:
    {{- include "sgroups-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: collector
data:
  config.yaml: |
    {{ .Values.collector.config | toYaml | nindent 4 }}
