---
# Client configuration for agent container
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "sgroups-agent.fullname" . }}-agent-config
  labels:
    {{- include "sgroups-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent
data:
  config.yaml: |
    {{ .Values.agent.config | toYaml | nindent 4 }}
