apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

labels:
  - pairs:
      app.kubernetes.io/part-of: sgroups
    includeSelectors: false

resources:
  - namespace.yaml
  - rbac.yaml
  - certificates.yaml
  - postgres-statefulset.yaml
  - migration-job.yaml
  - backend-deployment.yaml
  - apiserver-deployment.yaml
  - apiservice.yaml

configMapGenerator:
  - name: sgroups-apiserver-config
    namespace: sgroups-system
    files:
      - config.yaml=apiserver-config.yaml
  - name: sgroups-backend-config
    namespace: sgroups-system
    files:
      - config.yaml=backend-config.yaml

generatorOptions:
  disableNameSuffixHash: true
