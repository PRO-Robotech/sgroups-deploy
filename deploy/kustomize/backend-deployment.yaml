apiVersion: apps/v1
kind: Deployment
metadata:
  name: sgroups-backend
  namespace: sgroups-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sgroups-backend
  template:
    metadata:
      labels:
        app: sgroups-backend
    spec:
      containers:
        - name: sg-server
          image: sgroups-backend:latest
          imagePullPolicy: IfNotPresent
          command:
            - /app/bin/sg-server
          args:
            - -config=/etc/sgroups/config/config.yaml
          ports:
            - name: grpc
              containerPort: 9006
          readinessProbe:
            httpGet:
              path: /healthcheck
              port: 9006
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthcheck
              port: 9006
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            - name: backend-config
              mountPath: /etc/sgroups/config
              readOnly: true
      volumes:
        - name: backend-config
          configMap:
            name: sgroups-backend-config
---
apiVersion: v1
kind: Service
metadata:
  name: sgroups-backend
  namespace: sgroups-system
spec:
  selector:
    app: sgroups-backend
  ports:
    - name: grpc
      port: 9006
      targetPort: 9006
