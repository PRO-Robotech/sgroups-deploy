---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sgroups
  namespace: incloud-argocd
spec:
  destination:
    namespace: incloud-sgroups
    server: https://kubernetes.default.svc
  project: default
source:
  repoURL: registry-1.docker.io/prorobotech
  targetRevision: 0.0.1-2360018
  chart: sgroups-chart
  helm:
    releaseName: sgroups
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true

---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sgroups-k8s-api
  namespace: incloud-argocd
spec:
  destination:
    namespace: incloud-sgroups
    server: https://kubernetes.default.svc
  project: default
  source:
  repoURL: registry-1.docker.io/prorobotech
  targetRevision: 0.0.1-2360018
  chart: sgroups-k8s-api-chart
  helm:
    releaseName: sgroups-k8s-api
    valuesObject:
      config:
        grpc:
          address: "sgroups.incloud-sgroups.svc:9006"
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - Replace=true
